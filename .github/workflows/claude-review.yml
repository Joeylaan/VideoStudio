name: Claude PR Review

# Automatic mode: reviews every opened/updated pull request with a preset
# prompt — no @claude mention needed.
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    # Skip PRs from forks: by design they run WITHOUT access to repo secrets, so
    # the OAuth token wouldn't be available. (Exposing secrets to fork code would
    # be unsafe, so this is the secure default — fork PRs simply won't be auto-reviewed.)
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request for bugs, security issues, and code quality.
            This is a React + Vite WebGL image-effects app, so pay attention to the
            shader/effect pipeline and WebGL resource handling. Leave concise inline
            comments on specific lines, then end with a short overall summary.
          claude_args: "--max-turns 10"
