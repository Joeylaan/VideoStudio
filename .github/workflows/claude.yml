name: Claude Code

# On-demand mode: runs when you mention @claude in an issue comment or a PR
# review comment. Claude reads the thread and acts (answers, edits, opens PRs).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Public-repo guard: only the repo owner, org members, or collaborators can
    # trigger Claude — and only when the comment actually contains "@claude".
    # This stops random visitors from spending your quota.
    if: |
      contains(github.event.comment.body, '@claude') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Uses your Claude subscription via an OAuth token (no separate API billing).
          # Generate it with `claude setup-token` and store it as a repo secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
